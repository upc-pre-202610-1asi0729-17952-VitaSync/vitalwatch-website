<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/styles/desktop_styles.css">
    <link rel="stylesheet" href="./assets/styles/mobile_styles.css">
    <title>Document</title>
</head>
<body>
    <header>
        <!--NAV BAR-->
    </header>

    <section id="hero">

    </section>

    <section id="functionality">

        <div class="cards-container">

            <div id="administrative-benefits">

                <!--US 4-->

            </div>

            <div id="clinic-benefits">

                <!--US 5-->
                
            </div>

        </div>

    </section>

    <section id="suscription-plans">
        
    </section>

    <section id="terms-and-conditions">
        
    </section>

    <section id="contact-section">

    <h1>Comunícate con nosotros</h1>

    <div id="contact-container">

        <div id="contact-form-container">
            <form>

                <div class="form-row">
                    <div class="form-group">
                        <label>Tu nombre:</label>
                        <input type="text" placeholder="Nombre" required>
                    </div>

                    <div class="form-group">
                        <label>Tu correo electrónico:</label>
                        <input type="email" placeholder="correo@electronico.com" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Tu número:</label>
                        <input type="text" placeholder="999888777" required>
                    </div>

                    <div class="form-group">
                        <label>Nombre de la clínica:</label>
                        <input type="text" placeholder="Clinica" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Tu cargo en la clínica:</label>
                        <input type="text">
                    </div>

                    <div class="form-group">
                        <label>Dirección de la clínica:</label>
                        <input type="text">
                    </div>
                </div>

                <div class="form-group">
                    <label>Escríbenos:</label>
                    <textarea></textarea>
                </div>

                <div id="submit-button">
                    <button type="submit">Enviar</button>
                </div>

            </form>
        </div>

        <div id="contact-image">
            <img src="./assets/images/contact_image_desktop.png" alt="Imagen ilustrativa de contacto">
        </div>

    </div>

    </section>

    <footer>
        <!--SOCIAL MEDIA-->
    </footer>

    <script src="./assets/scripts/main.js" defer></script>
</body>
</html>
